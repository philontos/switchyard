<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Task Dispatcher</title>
<link rel="stylesheet" href="/vendor/xterm.css" />
<link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div id="boot"><div class="spinner"></div></div>
<header>🛰️ Task Dispatcher<span style="flex:1"></span><button id="preset-btn" class="sec" data-i18n="preset.manage" onclick="openPresetModal()"></button><button id="lang-toggle" class="sec" onclick="I18N.setLang(I18N.lang === 'zh' ? 'en' : 'zh')"></button></header>
<div class="wrap">
  <div class="side">
    <div id="machines"></div>
  </div>

  <div class="main">
    <div class="tabs">
      <button class="tab active" data-tab="live" data-i18n="tab.live" onclick="showTab('live')"></button>
      <button class="tab" data-tab="arch" onclick="showTab('arch')"><span data-i18n="tab.archived"></span> <span id="arch-count" class="muted"></span></button>
    </div>
    <div id="tasks"></div>
    <div id="archived" hidden></div>
  </div>
</div>

<div id="dock" class="dock collapsed">
  <div class="termbar">
    <button id="dock-toggle" onclick="toggleDock()"></button>
    <span id="term-title" data-i18n="term.notConnected"></span>
    <span id="term-desc"></span>
    <span class="hint" style="flex:none" data-i18n="term.selectHint" data-i18n-title="term.selectHintTitle"></span>
    <code id="term-attach"></code>
  </div>
  <div id="term"></div>
</div>

<div id="loading"><div class="spinner"></div><div id="loading-text"></div></div>

<div id="toasts"></div>

<div id="dialog" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 id="dlg-title" style="margin:0 0 4px"></h2>
    <div id="dlg-msg" class="dlg-msg"></div>
    <input id="dlg-input" style="display:none" />
    <div class="dlg-actions">
      <button id="dlg-cancel" class="sec" data-i18n="dialog.cancel"></button>
      <button id="dlg-ok" data-i18n="dialog.ok"></button>
    </div>
  </div>
</div>

<div id="task-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 style="margin-bottom:12px"><span data-i18n="task.modalTitle"></span> · <span id="tm-repo" style="color:#e09a7d"></span></h2>
    <label class="tm-lbl" data-i18n="task.baseLabel"></label>
    <div id="t-base" class="cs"></div>
    <label class="tm-lbl" data-i18n="task.presetLabel"></label>
    <div id="t-preset" class="cs"></div>
    <input id="t-title" data-i18n-ph="task.titlePh" />
    <textarea id="t-prompt" rows="3" data-i18n-ph="task.promptPh"></textarea>
    <label class="tm-lbl" data-i18n="task.extraSkills"></label>
    <div id="t-skills" class="skills-box"></div>
    <div class="dlg-actions">
      <button class="sec" data-i18n="dialog.cancel" onclick="closeTaskModal()"></button>
      <button class="primary" data-i18n="task.submit" onclick="addTask()"></button>
    </div>
  </div>
</div>

<div id="repo-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 style="margin-bottom:10px"><span data-i18n="repo.modalTitle"></span> · <span data-i18n="host.onMachine"></span> <span id="rm-host" style="color:#e09a7d"></span></h2>
    <input id="r-name" data-i18n-ph="repo.namePh" />
    <input id="r-url" data-i18n-ph="repo.urlPh" />
    <input id="r-token" data-i18n-ph="repo.tokenPh" />
    <input id="r-default" data-i18n-ph="repo.defaultPh" />
    <div class="dlg-actions">
      <button class="sec" data-i18n="dialog.cancel" onclick="closeRepoModal()"></button>
      <button class="primary" data-i18n="repo.submit" onclick="addRepo()"></button>
    </div>
    <div class="hint" style="margin-top:10px" data-i18n="repo.hint"></div>
  </div>
</div>

<div id="host-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 style="margin-bottom:10px" data-i18n="host.modalTitle"></h2>
    <input id="h-name" data-i18n-ph="host.namePh" />
    <input id="h-target" data-i18n-ph="host.targetPh" />
    <label class="tm-lbl" data-i18n="host.kindLabel"></label>
    <div id="h-kind" class="cs" data-ph="ssh"></div>
    <input id="h-session" data-i18n-ph="host.sessionPh" />
    <div class="dlg-actions">
      <button class="sec" data-i18n="dialog.cancel" onclick="closeHostModal()"></button>
      <button class="primary" data-i18n="host.submit" onclick="addHost()"></button>
    </div>
    <div class="hint" style="margin-top:10px" data-i18n="host.hint"></div>
  </div>
</div>

<div id="preset-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 style="margin-bottom:10px" data-i18n="preset.heading"></h2>
    <div id="preset-list"></div>
    <input id="p-name" data-i18n-ph="preset.namePh" />
    <input id="p-desc" data-i18n-ph="preset.descPh" />
    <textarea id="p-prompt" rows="3" data-i18n-ph="preset.promptPh"></textarea>
    <label class="tm-lbl" data-i18n="preset.skillsLabel"></label>
    <div id="p-skills" class="skills-box"></div>
    <div class="dlg-actions">
      <button class="sec" data-i18n="dialog.cancel" onclick="closePresetModal()"></button>
      <button class="primary" data-i18n="preset.submit" onclick="addPreset()"></button>
    </div>
  </div>
</div>

<!-- Fill UI text from the local i18n dict immediately, before loading the
     terminal libs — keeps the first paint correct regardless of script timing.
     xterm is self-hosted under /vendor (no external CDN). -->
<script src="/i18n.js"></script>
<script>I18N.init(); I18N.applyStatic();
  // failsafe: reveal the page even if a downstream script never runs
  setTimeout(function () { var b = document.getElementById("boot"); if (b) b.classList.add("done"); }, 7000);
</script>
<script src="/vendor/xterm.js"></script>
<script src="/vendor/addon-fit.js"></script>
<!-- App logic, split into ES modules under /js (no build step; main.js wires
     everything and bridges inline-onclick handlers onto window). -->
<script type="module" src="/js/main.js"></script>
</body>
</html>
