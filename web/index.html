<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Switchyard</title>
<!-- Browser-chrome / edge-strip color (iOS swipe transitions, address bar). Kept in
     sync with the active theme's --bg by the no-flash script below + theme.js. -->
<meta name="theme-color" content="#1a1613" />
<!-- Home-screen (发送到桌面) container: without a manifest the standalone web-app
     window's base color is WHITE, and iOS's swipe-back snapshot transition exposes it
     as a white sliver at the screen edge. background_color paints that base dark.
     NOTE: iOS reads the manifest when the icon is ADDED — re-add to pick this up. -->
<link rel="manifest" href="/manifest.webmanifest" />
<!-- No-flash theme init: set data-theme from storage BEFORE the stylesheet
     applies, so the first paint is already light/dark with no flicker. Default
     is dark (existing users unchanged). theme.js re-derives the same value. -->
<script>try{var _t=localStorage.getItem("theme");document.documentElement.dataset.theme=_t==="light"?"light":"dark";if(_t==="light"){var _m=document.querySelector('meta[name="theme-color"]');if(_m)_m.content="#f5f0e8";}}catch(e){document.documentElement.dataset.theme="dark";}</script>
<link rel="stylesheet" href="/vendor/xterm.css" />
<link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div id="boot"><div class="spinner"></div></div>
<header><a class="brand" href="/" aria-label="Switchyard"><img class="brand-logo" src="/assets/switchyard-wordmark.png" alt="Switchyard" /></a><span style="flex:1"></span><button id="self-update" class="sec icon-btn" onclick="updateSelf()" data-i18n-title="system.updateTitle" aria-label="Update"><span class="sync-icon" aria-hidden="true"></span></button><button id="skills-btn" class="sec" data-i18n="skill.manage" onclick="openSkillsModal()"></button><button id="theme-toggle" class="sec" onclick="Theme.toggle()"></button><button id="lang-toggle" class="sec" onclick="I18N.setLang(I18N.lang === 'zh' ? 'en' : 'zh')"></button></header>
<div class="wrap">
  <div id="m-rail" class="rail"></div>
  <div id="m-list" class="list"></div>
  <div id="termcol" class="termcol">
    <div id="termbar" class="termbar">
      <!-- mobile master-detail: back to the machine/repo list. Hidden on desktop
           (the list is always visible there). -->
      <button id="term-back" class="sec" onclick="mobileBack()" data-i18n-title="m.back" aria-label="Back">‹</button>
      <!-- mobile-only 阅读/实时 mode toggle (hidden on desktop). Reading shows the agent
           conversation as a native-scrolling chat; 实时 is the live terminal. -->
      <div id="term-mode" class="term-mode">
        <button id="tm-read" type="button" class="on" onclick="setReadMode('read')" data-i18n="read.tabRead"></button>
        <button id="tm-live" type="button" onclick="setReadMode('live')" data-i18n="read.tabLive"></button>
      </div>
      <span id="term-title" data-i18n="term.notConnected"></span>
      <button id="term-attach" class="attach-btn" type="button" data-i18n="term.attach" data-i18n-title="term.attachCopy"></button>
      <code id="term-claude" class="term-claude" style="display:none"></code>
      <span style="flex:1"></span>
      <input id="prev-port" class="prev-port" data-i18n-ph="preview.portPh" data-i18n-title="preview.portTitle" />
      <button id="prev-go" class="prev-btn" data-i18n-title="preview.go">↗</button>
    </div>
    <!-- mobile-only "needs you" bridge: shown while reading a task that's blocked on a
         permission prompt, one tap flips to 实时 to answer it (reading.js/main.js). -->
    <div id="read-banner" class="read-banner">
      <span>⚠ <b data-i18n="read.needsYou"></b></span>
      <button type="button" onclick="setReadMode('live')" data-i18n="read.goLive"></button>
    </div>
    <!-- mobile-only reading pane: the agent conversation as a scrollable chat (reading.js).
         Hidden on desktop and in 实时 mode. -->
    <div id="term-read" class="term-read"></div>
    <button id="read-jump" class="read-jump" type="button"><span aria-hidden="true">↓</span><span class="read-jump-label" data-i18n="read.latest"></span></button>
    <div id="term"></div>
    <div id="term-empty" class="term-empty"><div class="te-ic">🖥</div><div data-i18n="term.empty"></div></div>
    <!-- mobile-only quick-input bar (hidden on desktop via CSS). A whole line is
         buffered in the field (IME-friendly) and sent on 发送/Enter; the key row
         sends single keystrokes a soft keyboard can't deliver raw: 1/2/3 answer
         claude's numbered permission prompts (a bare digit selects AND confirms),
         ↑↓↵ drive any other menu, ⌃C/Esc interrupt. All input on mobile routes
         through here — see js/features/mobile.js. -->
    <div id="term-input" class="term-input">
      <!-- quick-key popover: toggled by the draggable floating button, and auto-opened while the dock task is
           blocked on a permission prompt (mobile.js reflectKeysWaiting). Sticky —
           tapping a key sends but does NOT close it; only the floating button closes it. Absolute-
           positioned, so opening it overlays the terminal instead of resizing/
           refitting it. Key order: answer digits in the thumb zone, interrupt keys
           (⌃C/Esc) far right so a stray thumb can't reach them by accident. -->
      <div id="ti-keys" class="ti-keys">
        <button class="ti-key tk-num" data-k="1" type="button">1</button>
        <button class="ti-key tk-num" data-k="2" type="button">2</button>
        <button class="ti-key tk-num" data-k="3" type="button">3</button>
        <button class="ti-key" data-k="up" type="button">↑</button>
        <button class="ti-key" data-k="down" type="button">↓</button>
        <button class="ti-key" data-k="enter" type="button">↵</button>
        <button class="ti-key" data-k="int" type="button">⌃C</button>
        <button class="ti-key" data-k="esc" type="button">Esc</button>
      </div>
      <div class="ti-row">
        <!-- auto-growing compose field (mobile.js). Enter inserts a newline; 发送 sends
             (a multiline value goes as one bracketed paste + Enter). -->
        <textarea id="ti-field" rows="1" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" data-i18n-ph="m.inputPh"></textarea>
        <button id="ti-send" class="primary" type="button" data-i18n="m.send"></button>
      </div>
    </div>
    <!-- Mobile-only draggable special-key control. It floats over terminal content,
         snaps to either screen edge, and is constrained away from navigation,
         composer, and the expanded quick-key row. -->
    <button id="ti-float" class="ti-float" type="button" aria-label="Keys" aria-controls="ti-keys" aria-expanded="false" data-i18n-title="m.fnKeys"><span class="ti-float-icon" aria-hidden="true"></span></button>
  </div>
</div>

<div id="loading"><div class="spinner"></div><div id="loading-text"></div></div>

<div id="toasts"></div>

<div id="dialog" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 id="dlg-title" style="margin:0 0 4px"></h2>
    <div id="dlg-msg" class="dlg-msg"></div>
    <input id="dlg-input" style="display:none" />
    <div class="dlg-actions">
      <button id="dlg-cancel" class="sec" data-i18n="dialog.cancel"></button>
      <button id="dlg-ok" data-i18n="dialog.ok"></button>
    </div>
  </div>
</div>

<div id="task-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 style="margin-bottom:12px"><span data-i18n="task.modalTitle"></span> · <span id="tm-repo" style="color:#e09a7d"></span></h2>
    <!-- agent axis: which coding-agent CLI runs the task. The selected node runs
         the same agent locally, whether this is the controller or a remote node. -->
    <div id="t-agent-sec">
      <label class="tm-lbl" data-i18n="task.agentLabel"></label>
      <div id="t-agent-seg" class="agent-seg">
        <button type="button" class="agent-opt selected" data-agent="claude" onclick="selectAgent('claude')">Claude Code</button>
        <button type="button" class="agent-opt" data-agent="codex" onclick="selectAgent('codex')">Codex</button>
      </div>
    </div>
    <label class="tm-lbl" data-i18n="task.baseLabel"></label>
    <div id="t-base" class="cs"></div>
    <input id="t-title" data-i18n-ph="task.titlePh" />
    <textarea id="t-prompt" rows="3" data-i18n-ph="task.promptPh"></textarea>
    <label class="tm-lbl" data-i18n="task.extraSkills"></label>
    <div id="t-skills" class="skills-box"></div>
    <!-- codex has no skill mechanism: the box above is greyed out and this note
         explains why (shown only when Codex is the selected agent). -->
    <div id="t-skills-codex-note" class="hint" style="display:none" data-i18n="agent.codexSkillsNote"></div>
    <!-- model backend: only meaningful for in-process dispatch (this controller
         launches claude). Hidden in node mode — a bootstrapped remote owns its
         own claude login, so the picker doesn't apply there. -->
    <div id="t-provider-sec">
      <label class="tm-lbl" data-i18n="provider.label"></label>
      <div class="tm-prov">
        <div id="t-provider" class="cs"></div>
        <button type="button" class="prov-add-btn" data-i18n-title="provider.manage" onclick="toggleProviderPanel()">＋</button>
      </div>
      <div id="prov-panel" class="prov-panel" style="display:none">
        <input id="pv-name" data-i18n-ph="provider.namePh" oninput="onPanelInput('name')" />
        <input id="pv-url" data-i18n-ph="provider.urlPh" oninput="onPanelInput('url')" />
        <input id="pv-token" data-i18n-ph="provider.tokenPh" oninput="onPanelInput('token')" />
        <input id="pv-model" data-i18n-ph="provider.modelPh" oninput="onPanelInput('model')" />
        <input id="pv-fast" data-i18n-ph="provider.fastPh" oninput="onPanelInput('fast')" />
        <div class="pv-actions">
          <span id="pv-status" class="pv-status"></span>
          <span style="flex:1"></span>
          <button id="pv-test" class="sec" data-i18n="provider.test" onclick="testProvider()"></button>
          <button id="pv-add" class="primary" data-i18n="provider.add" onclick="addProvider()" disabled></button>
        </div>
        <div id="pv-list" class="pv-list"></div>
        <div class="hint" style="margin-top:8px" data-i18n="provider.hint"></div>
      </div>
    </div>
    <!-- codex-only: an optional model (-m) + the full-access note. Shown in place
         of the (claude-only) provider picker when Codex is the selected agent. -->
    <div id="t-codex-sec" style="display:none">
      <label class="tm-lbl" data-i18n="agent.modelLabel"></label>
      <input id="t-codex-model" data-i18n-ph="agent.codexModelPh" />
      <div class="hint" style="margin-top:2px" data-i18n="agent.codexAutoNote"></div>
    </div>
    <div class="dlg-actions">
      <button class="sec" data-i18n="dialog.cancel" onclick="cancelTaskModal()"></button>
      <button class="primary" data-i18n="task.submit" onclick="addTask()"></button>
    </div>
  </div>
</div>

<div id="repo-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 style="margin-bottom:10px"><span data-i18n="repo.modalTitle"></span> · <span data-i18n="host.onMachine"></span> <span id="rm-host" style="color:#e09a7d"></span></h2>
    <label class="repo-field">
      <span data-i18n="repo.nameLabel"></span>
      <input id="r-name" data-i18n-ph="repo.namePh" aria-required="true" />
    </label>
    <label class="repo-field">
      <span data-i18n="repo.urlLabel"></span>
      <input id="r-url" data-i18n-ph="repo.urlPh" aria-required="true" />
    </label>
    <label class="repo-field">
      <span data-i18n="repo.tokenLabel"></span>
      <input id="r-token" data-i18n-ph="repo.tokenPh" />
    </label>
    <label class="repo-field">
      <span data-i18n="repo.defaultLabel"></span>
      <input id="r-default" data-i18n-ph="repo.defaultPh" />
    </label>
    <div class="dlg-actions">
      <button class="sec" data-i18n="dialog.cancel" onclick="closeRepoModal()"></button>
      <button id="r-submit" class="primary" data-i18n="repo.submit" onclick="addRepo()"></button>
    </div>
    <div id="r-status" class="repo-modal-status" aria-live="polite"></div>
    <div class="hint" style="margin-top:10px" data-i18n="repo.hint"></div>
  </div>
</div>

<div id="host-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 style="margin-bottom:10px" data-i18n="host.modalTitle"></h2>
    <input id="h-name" data-i18n-ph="host.namePh" />
    <input id="h-target" data-i18n-ph="host.targetPh" />
    <label class="tm-lbl" data-i18n="host.kindLabel"></label>
    <div id="h-kind" class="cs" data-ph="ssh"></div>
    <div class="dlg-actions">
      <button class="sec" data-i18n="dialog.cancel" onclick="closeHostModal()"></button>
      <button class="primary" data-i18n="host.submit" onclick="addHost()"></button>
    </div>
    <div class="hint" style="margin-top:10px" data-i18n="host.hint"></div>
  </div>
</div>

<div id="skills-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 style="margin-bottom:10px" data-i18n="skill.modalTitle"></h2>
    <input id="sk-filter" data-i18n-ph="skill.filterPh" oninput="filterSkillList(this.value)" />
    <div id="sk-list" class="pg-box"></div>
    <div class="dlg-actions">
      <button class="sec" data-i18n="dialog.cancel" onclick="closeSkillsModal()"></button>
    </div>
  </div>
</div>

<!-- Fill UI text from the local i18n dict immediately, before loading the
     terminal libs — keeps the first paint correct regardless of script timing.
     xterm is self-hosted under /vendor (no external CDN). -->
<script src="/i18n.js"></script>
<script src="/theme.js"></script>
<script>I18N.init(); Theme.init(); I18N.applyStatic();
  // failsafe: reveal the page even if a downstream script never runs
  setTimeout(function () { var b = document.getElementById("boot"); if (b) b.classList.add("done"); }, 7000);
</script>
<script src="/vendor/xterm.js"></script>
<script src="/vendor/addon-fit.js"></script>
<!-- @xterm/addon-unicode11@0.8.0, the stable provider compatible with xterm 5.5. -->
<script src="/vendor/addon-unicode11.js"></script>
<!-- App logic, split into ES modules under /js (no build step; main.js wires
     everything and bridges inline-onclick handlers onto window). -->
<script type="module" src="/js/main.js"></script>
</body>
</html>
