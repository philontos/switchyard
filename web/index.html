<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Task Dispatcher</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 13px/1.55 -apple-system, "SF Pro Text", system-ui, "PingFang SC", sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; letter-spacing: .1px; }
  header { padding: 12px 18px; background: #161b22; border-bottom: 1px solid #30363d; font-weight: 600; flex: none; display: flex; align-items: center; gap: 10px; }
  #lang-toggle { width: auto; margin: 0; padding: 3px 12px; font-size: 12px; background: #21262d; border-color: #30363d; }
  .wrap { display: grid; grid-template-columns: 320px 1fr; flex: 1; min-height: 0; }
  .side { border-right: 1px solid #30363d; overflow-y: auto; padding: 14px; }
  .main { min-width: 0; overflow-y: auto; padding: 0 18px 24px; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: #8b949e; margin: 18px 0 8px; }
  input, select, textarea { font: inherit; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 9px; width: 100%; margin-bottom: 7px; }
  input::placeholder, textarea::placeholder { color: #525a63; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #4b93f0; }
  /* custom select */
  .cs { position: relative; margin-bottom: 7px; user-select: none; }
  .cs-trigger { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 6px 9px; margin: 0; color: #c9d1d9; }
  .cs-trigger:hover { background: #0d1117; border-color: #3d4450; }
  .cs.open .cs-trigger { border-color: #4b93f0; }
  .cs-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cs-label.ph { color: #525a63; }
  .cs-caret { color: #6e7681; font-size: 10px; transition: transform .15s; }
  .cs.open .cs-caret { transform: rotate(180deg); }
  .cs-menu { position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 60;
    background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 4px;
    box-shadow: 0 10px 30px #000b; max-height: 232px; overflow-y: auto; animation: csin .12s ease; }
  .cs-opt { display: flex; align-items: center; gap: 8px; padding: 6px 9px; border-radius: 5px;
    cursor: pointer; font-size: 13px; }
  .cs-opt:hover, .cs-opt.hl { background: #1f6feb1f; }
  .cs-opt.sel { color: #79c0ff; }
  .cs-opt .ck { margin-left: auto; color: #58a6ff; opacity: 0; font-size: 11px; }
  .cs-opt.sel .ck { opacity: 1; }
  .cs-empty { padding: 8px 9px; color: #6e7681; font-size: 12px; }
  .cs-spin { display: inline-block; width: 11px; height: 11px; margin-right: 6px; vertical-align: -1px;
    border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes csin { from { opacity: 0; transform: translateY(-3px); } }
  button { font: inherit; font-size: 12.5px; font-weight: 500; line-height: 1.4; padding: 4px 11px; border-radius: 6px; cursor: pointer; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; transition: background .12s, border-color .12s; }
  button:hover { background: #2a313a; }
  button.primary { background: #238636; border-color: #2ea04355; color: #fff; }
  button.primary:hover { background: #2ea043; }
  button.accent { background: #1f6feb1f; border-color: #1f6feb55; color: #79c0ff; }
  button.accent:hover { background: #1f6feb30; border-color: #1f6feb99; }
  button.sec { background: #21262d; }
  button.danger { background: #21262d; border-color: #30363d; color: #f0837c; }
  button.danger:hover { background: #f8514914; border-color: #f85149aa; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .card { border: 1px solid #30363d; border-radius: 8px; padding: 10px; margin-bottom: 8px; background: #161b22; }
  .card .t { font-weight: 600; }
  /* repo card */
  .repo { position: relative; }
  .repo .t { padding-right: 22px; display: flex; align-items: center; gap: 6px; }
  .repo .url { margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .repo .err { color: #ffa198; margin-top: 4px; }
  .repo-del { position: absolute; top: 7px; right: 7px; width: auto; margin: 0; padding: 1px 6px;
    background: none; border: none; color: #6e7681; font-size: 14px; line-height: 1; }
  .repo-del:hover { background: #f8514914; color: #f85149; }
  .repo .disp { width: 100%; margin: 10px 0 0; }
  .tm-lbl { display: block; font-size: 11px; color: #8b949e; margin-bottom: 4px; }
  /* task card */
  .task { position: relative; }
  .task .t { padding-right: 24px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .card.clickable { cursor: pointer; transition: border-color .12s, background .12s; }
  .card.clickable:hover { border-color: #4b93f0; background: #1b2230; }
  /* selected: the item currently open in the bottom terminal — left accent bar + tint, wins over hover */
  .card.selected, .card.clickable.selected:hover { border-color: #4b93f0; background: #1f6feb1f;
    box-shadow: inset 3px 0 0 #58a6ff; }
  .card-x { position: absolute; top: 7px; right: 7px; width: auto; margin: 0; padding: 1px 6px;
    background: none; border: none; color: #6e7681; font-size: 13px; line-height: 1; }
  .card-x:hover { background: #f8514914; color: #f85149; }
  .muted { color: #8b949e; font-size: 12px; }
  .pill { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 10px; border: 1px solid #30363d; }
  .pill.live { background: #1f6feb33; border-color: #1f6feb; color: #79c0ff; }
  .pill.ready { background: #23863633; border-color: #238636; color: #7ee787; }
  .pill.error { background: #b6232433; border-color: #b62324; color: #ffa198; }
  .pill.cleaned, .pill.cloning { color: #8b949e; }
  /* bottom terminal dock (secondary display, collapsible) */
  .dock { flex: none; height: 720px; border-top: 1px solid #30363d; background: #0d1117; display: flex; flex-direction: column; transition: height .15s ease; }
  .dock.collapsed { height: 38px; }
  .dock.collapsed #term { display: none; }
  #tasks, #archived { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  #tasks[hidden], #archived[hidden] { display: none; }
  #archived .card { opacity: .6; }
  .tabs { display: flex; align-items: center; gap: 2px; margin: 14px 0 12px; border-bottom: 1px solid #30363d; }
  .tab { width: auto; margin: 0; background: none; border: none; border-bottom: 2px solid transparent; border-radius: 0; color: #8b949e; padding: 7px 13px; font-weight: 600; font-size: 13px; }
  .tab:hover { color: #c9d1d9; filter: none; }
  .tab.active { color: #c9d1d9; border-bottom-color: #58a6ff; }
  .empty { grid-column: 1 / -1; text-align: center; color: #6e7681; padding: 56px 16px; }
  .empty-ic { font-size: 34px; margin-bottom: 10px; opacity: .7; }
  .empty-hint { font-size: 12px; margin-top: 6px; color: #586069; }
  .repo-empty { border: 1px dashed #30363d; border-radius: 8px; padding: 22px 14px; text-align: center;
    background: #0d111733; }
  .repo-empty .ic { font-size: 30px; opacity: .65; }
  .repo-empty .t { margin-top: 8px; font-size: 13px; font-weight: 600; color: #c9d1d9; }
  .repo-empty .h { margin-top: 4px; font-size: 11.5px; color: #6e7681; line-height: 1.5; }
  .repo-empty .link { color: #58a6ff; cursor: pointer; }
  .repo-empty .link:hover { text-decoration: underline; }
  #term { flex: 1; padding: 6px; min-height: 0; }
  .termbar { padding: 6px 12px; border-bottom: 1px solid #30363d; background: #161b22; display: flex; align-items: center; gap: 10px; flex: none; }
  .termbar code { background: #0d1117; padding: 2px 6px; border-radius: 4px; border: 1px solid #30363d; flex: none; }
  #term-title { color: #c9d1d9; font-weight: 600; white-space: nowrap; flex: none; max-width: 40%; overflow: hidden; text-overflow: ellipsis; }
  #term-desc { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #6e7681; font-size: 12px; }
  .termbar #dock-toggle { width: auto; margin: 0; padding: 3px 10px; font-size: 12px; background: #21262d; border-color: #30363d; }
  a { color: #58a6ff; }
  .hint { font-size: 11px; color: #6e7681; }
  .modal-bg { position: fixed; inset: 0; background: #000a; display: flex; align-items: center; justify-content: center; z-index: 50; }
  .modal { width: 420px; max-width: 92vw; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 18px; }
  .modal h2 { margin-top: 0; }
  .sessrow { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 5px 0; border-bottom: 1px solid #21262d; }
  .sessrow code { background: #0d1117; padding: 1px 6px; border-radius: 4px; }
  .sessrow button { width: auto; padding: 2px 8px; margin: 0; font-size: 11px; }
  .sessrow label { display: inline-flex; align-items: center; gap: 3px; color: #8b949e; cursor: pointer; white-space: nowrap; }
  .sessrow input[type=checkbox] { width: auto; margin: 0; }

  /* toast */
  #toasts { position: fixed; top: 14px; right: 14px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
  .toast { min-width: 220px; max-width: 360px; padding: 10px 14px; border-radius: 8px; background: #1c2128;
    border: 1px solid #30363d; border-left: 3px solid #6e7681; box-shadow: 0 6px 24px #0008;
    font-size: 13px; animation: tin .18s ease; word-break: break-word; }
  .toast.success { border-left-color: #2ea043; }
  .toast.error { border-left-color: #f85149; }
  .toast.info { border-left-color: #58a6ff; }
  .toast.out { animation: tout .25s ease forwards; }
  @keyframes tin { from { opacity: 0; transform: translateX(16px); } }
  @keyframes tout { to { opacity: 0; transform: translateX(16px); } }
  /* dialog */
  .dlg-msg { margin: 6px 0 12px; white-space: pre-wrap; }
  .dlg-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .dlg-actions button { width: auto; padding: 6px 16px; margin: 0; }
  /* global loading */
  #loading { position: fixed; inset: 0; background: #0d1117cc; z-index: 200; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 14px; backdrop-filter: blur(1px); }
  #loading.on { display: flex; }
  .spinner { width: 38px; height: 38px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .8s linear infinite; }
  #loading-text { color: #c9d1d9; font-size: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>🛰️ Task Dispatcher<span style="flex:1"></span><button id="lang-toggle" class="sec" onclick="I18N.setLang(I18N.lang === 'zh' ? 'en' : 'zh')"></button></header>
<div class="wrap">
  <div class="side">
    <button class="accent" style="width:100%;margin-bottom:14px" data-i18n="repo.new" onclick="openRepoModal()"></button>
    <h2 data-i18n="repo.heading"></h2>
    <div id="repos"></div>

    <button class="accent" style="width:100%;margin-top:20px" data-i18n="host.new" onclick="openHostModal()"></button>
    <h2 data-i18n="host.heading"></h2>
    <div id="hosts"></div>
  </div>

  <div class="main">
    <div class="tabs">
      <button class="tab active" data-tab="live" data-i18n="tab.live" onclick="showTab('live')"></button>
      <button class="tab" data-tab="arch" onclick="showTab('arch')"><span data-i18n="tab.archived"></span> <span id="arch-count" class="muted"></span></button>
    </div>
    <div id="tasks"></div>
    <div id="archived" hidden></div>
  </div>
</div>

<div id="dock" class="dock collapsed">
  <div class="termbar">
    <button id="dock-toggle" onclick="toggleDock()"></button>
    <span id="term-title" data-i18n="term.notConnected"></span>
    <span id="term-desc"></span>
    <span class="hint" style="flex:none" data-i18n="term.selectHint" data-i18n-title="term.selectHintTitle"></span>
    <code id="term-attach"></code>
  </div>
  <div id="term"></div>
</div>

<div id="loading"><div class="spinner"></div><div id="loading-text"></div></div>

<div id="toasts"></div>

<div id="dialog" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 id="dlg-title" style="margin:0 0 4px"></h2>
    <div id="dlg-msg" class="dlg-msg"></div>
    <input id="dlg-input" style="display:none" />
    <div class="dlg-actions">
      <button id="dlg-cancel" class="sec" data-i18n="dialog.cancel"></button>
      <button id="dlg-ok" data-i18n="dialog.ok"></button>
    </div>
  </div>
</div>

<div id="task-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 style="margin-bottom:12px"><span data-i18n="task.modalTitle"></span> · <span id="tm-repo" style="color:#79c0ff"></span></h2>
    <label class="tm-lbl" data-i18n="task.baseLabel"></label>
    <div id="t-base" class="cs"></div>
    <input id="t-title" data-i18n-ph="task.titlePh" />
    <textarea id="t-prompt" rows="3" data-i18n-ph="task.promptPh"></textarea>
    <div class="dlg-actions">
      <button class="sec" data-i18n="dialog.cancel" onclick="closeTaskModal()"></button>
      <button class="primary" data-i18n="task.submit" onclick="addTask()"></button>
    </div>
  </div>
</div>

<div id="repo-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 style="margin-bottom:10px" data-i18n="repo.modalTitle"></h2>
    <input id="r-name" data-i18n-ph="repo.namePh" />
    <input id="r-url" data-i18n-ph="repo.urlPh" />
    <input id="r-token" data-i18n-ph="repo.tokenPh" />
    <input id="r-default" data-i18n-ph="repo.defaultPh" />
    <div class="dlg-actions">
      <button class="sec" data-i18n="dialog.cancel" onclick="closeRepoModal()"></button>
      <button class="primary" data-i18n="repo.submit" onclick="addRepo()"></button>
    </div>
    <div class="hint" style="margin-top:10px" data-i18n="repo.hint"></div>
  </div>
</div>

<div id="host-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2 style="margin-bottom:10px" data-i18n="host.modalTitle"></h2>
    <input id="h-name" data-i18n-ph="host.namePh" />
    <input id="h-target" data-i18n-ph="host.targetPh" />
    <label class="tm-lbl" data-i18n="host.kindLabel"></label>
    <div id="h-kind" class="cs" data-ph="ssh"></div>
    <input id="h-session" data-i18n-ph="host.sessionPh" />
    <div class="dlg-actions">
      <button class="sec" data-i18n="dialog.cancel" onclick="closeHostModal()"></button>
      <button class="primary" data-i18n="host.submit" onclick="addHost()"></button>
    </div>
    <div class="hint" style="margin-top:10px" data-i18n="host.hint"></div>
  </div>
</div>

<!-- Local i18n FIRST, then fill the UI text immediately from the local dict —
     before the render-blocking CDN terminal libs below. On a hard refresh those
     CDN files are re-fetched over the network and block everything after them;
     filling text here keeps every data-i18n element from rendering empty/collapsed
     ("squished") until the CDN finishes. -->
<script src="/i18n.js"></script>
<script>I18N.init(); I18N.applyStatic();</script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const api = (u, opt = {}) => fetch(u, { ...opt, headers: { ...(opt.headers || {}), "X-Lang": I18N.lang } })
  .then(async r => { const j = await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.error||r.status); return j; });

// ---- toast ----
function toast(msg, type = "info", ms = 3500) {
  const el = document.createElement("div");
  el.className = "toast " + type;
  el.textContent = msg;
  $("toasts").appendChild(el);
  const close = () => { el.classList.add("out"); setTimeout(() => el.remove(), 250); };
  el.addEventListener("click", close);
  setTimeout(close, ms);
}

// ---- global loading overlay ----
function showLoading(text) { $("loading-text").textContent = text || t("loading.default"); $("loading").classList.add("on"); }
function hideLoading() { $("loading").classList.remove("on"); }

// ---- dialog (promise-based confirm / prompt) ----
let dlgResolve = null;
function openDialog({ title = "", message = "", input = false, value = "", okText, danger = false }) {
  okText = okText || t("dialog.ok");
  return new Promise((resolve) => {
    dlgResolve = resolve;
    $("dlg-title").textContent = title;
    $("dlg-title").style.display = title ? "" : "none";
    $("dlg-msg").textContent = message;
    const inp = $("dlg-input");
    inp.style.display = input ? "" : "none";
    if (input) { inp.value = value; setTimeout(() => { inp.focus(); inp.select(); }, 30); }
    const ok = $("dlg-ok");
    ok.textContent = okText;
    ok.className = danger ? "danger" : "";
    $("dialog").style.display = "flex";
  });
}
function closeDialog(result) {
  $("dialog").style.display = "none";
  const r = dlgResolve; dlgResolve = null;
  if (r) r(result);
}
function confirmDialog(message, opts = {}) { return openDialog({ message, ...opts }).then(Boolean); }
function promptDialog(message, value = "", opts = {}) {
  return openDialog({ message, input: true, value, ...opts });
}
$("dlg-ok").onclick = () => closeDialog($("dlg-input").style.display === "none" ? true : $("dlg-input").value);
$("dlg-cancel").onclick = () => closeDialog(null);
$("dialog").addEventListener("click", (e) => { if (e.target.id === "dialog") closeDialog(null); });
$("dlg-input").addEventListener("keydown", (e) => { if (e.key === "Enter") $("dlg-ok").click(); });

// global safety net: surface uncaught API errors as toasts
window.addEventListener("unhandledrejection", (e) => {
  toast(String(e.reason?.message || e.reason || t("toast.opFailed")), "error");
});

let term, fit, ws, repos = [], branchReq = null, taskRepoId = null, tasksById = {}, hostsById = {}, selectedTaskId = null, selectedHostId = null;

function initTerm() {
  term = new Terminal({
    fontSize: 13, fontFamily: "Menlo, monospace", theme: { background: "#0d1117" }, cursorBlink: true,
    macOptionClickForcesSelection: true,   // mac: Option+拖拽 强制本地选区(绕开 TUI 鼠标模式)
    rightClickSelectsWord: true,
  });
  fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  term.open($("term"));
  // claude TUI 开了鼠标上报,普通拖拽会被转发给应用; Shift/Option 拖拽走本地选区,松手即复制
  term.element.addEventListener("mouseup", () => {
    const s = term.getSelection();
    if (s) navigator.clipboard.writeText(s).catch(() => {});
  });
  // 键盘复制: mac=Cmd+C, 其他=Ctrl+Shift+C; 仅在有选区时拦截,避免吃掉 ^C(SIGINT)
  term.attachCustomKeyEventHandler((e) => {
    if (e.type !== "keydown") return true;
    const isMac = navigator.platform.toUpperCase().includes("MAC");
    const isCopy = isMac ? (e.metaKey && e.code === "KeyC") : (e.ctrlKey && e.shiftKey && e.code === "KeyC");
    if (isCopy && term.hasSelection()) {
      navigator.clipboard.writeText(term.getSelection()).catch(() => {});
      return false;
    }
    return true;
  });
  try { fit.fit(); } catch {}
  window.addEventListener("resize", () => { try { fit.fit(); sendResize(); } catch {} });
  term.onData(d => ws && ws.readyState === 1 && ws.send(d));
}
function sendResize() {
  if (ws && ws.readyState === 1) ws.send("\x00resize:" + term.cols + "x" + term.rows);
}
function renderDockToggle() {
  const collapsed = $("dock").classList.contains("collapsed");
  $("dock-toggle").textContent = (collapsed ? "▴ " : "▾ ") + t("term.label");
}
function expandDock() {
  $("dock").classList.remove("collapsed");
  renderDockToggle();
  setTimeout(() => { try { fit.fit(); sendResize(); } catch {} }, 160);
}
function toggleDock() {
  const d = $("dock");
  if (d.classList.contains("collapsed")) expandDock();
  else { d.classList.add("collapsed"); renderDockToggle(); }
}

// reflect the current selection onto the cards already in the DOM (no refetch)
function paintSelection() {
  document.querySelectorAll("#tasks .task, #archived .task").forEach(el => {
    el.classList.toggle("selected", Number(el.dataset.id) === selectedTaskId);
  });
  document.querySelectorAll("#hosts .card").forEach(el => {
    el.classList.toggle("selected", Number(el.dataset.id) === selectedHostId);
  });
}

// open the terminal dock against a /pty target (local session or remote host)
function openPty(query, title, desc, attach) {
  if (ws) { ws.close(); ws = null; }
  expandDock();
  term.reset();
  // dynamic content, not a localized label — drop the static i18n binding so a
  // language switch won't overwrite the title back to "Not connected".
  $("term-title").removeAttribute("data-i18n");
  $("term-title").textContent = title;
  $("term-desc").textContent = desc || "";
  $("term-desc").title = desc || "";       // full text on hover
  $("term-attach").textContent = attach || "";
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/pty?${query}&lang=${I18N.lang}`);
  ws.onopen = () => { fit.fit(); sendResize(); };
  ws.onmessage = (e) => term.write(typeof e.data === "string" ? e.data : "");
  ws.onclose = () => term.write(`\r\n\x1b[90m${I18N.t("term.disconnected")}\x1b[0m\r\n`);
}

function connect(id) {
  const t = tasksById[id];
  if (!t) return;
  selectedTaskId = id; selectedHostId = null; paintSelection();
  openPty(`session=${encodeURIComponent(t.session)}`,
    `#${t.id} ${t.title}`, t.prompt ? `· ${t.prompt}` : "", "tmux attach -t " + t.session);
}

function connectHost(id) {
  const h = hostsById[id];
  if (!h) return;
  selectedHostId = id; selectedTaskId = null; paintSelection();
  openPty(`host=${id}`, `🖥 ${h.name}`, `· ${h.target} · ${h.session}`,
    (h.kind === "mosh" ? "mosh " : "ssh -t ") + h.target);
}

function openRepoModal() { $("repo-modal").style.display = "flex"; $("r-name").focus(); }
function closeRepoModal() { $("repo-modal").style.display = "none"; }
function openTaskModal(repoId) {
  const repo = repos.find(r => r.id === repoId && r.status === "ready");
  if (!repo) return toast(t("toast.repoNotReady"), "error");
  taskRepoId = repoId;
  $("tm-repo").textContent = repo.name;
  $("t-title").value = ""; $("t-prompt").value = "";   // fresh form each open
  $("task-modal").style.display = "flex";
  loadBranches();
  setTimeout(() => $("t-title").focus(), 30);
}
function closeTaskModal() { $("task-modal").style.display = "none"; }

async function addRepo() {
  const body = {
    name: $("r-name").value.trim(), git_url: $("r-url").value.trim(),
    token: $("r-token").value.trim(),
    default_branch: $("r-default").value.trim() || "main",
  };
  if (!body.name || !body.git_url) return toast(t("toast.repoFieldsRequired"), "error");
  await api("/api/repos", { method: "POST", headers: {"content-type":"application/json"}, body: JSON.stringify(body) });
  ["r-name","r-url","r-token","r-default"].forEach(i => $(i).value = "");
  closeRepoModal();
  toast(t("toast.repoRegistered"), "success");
  loadRepos();
}

// ---- minimal custom <select> ----
const Selects = {};
function csMount(id, onChange) {
  const root = $(id);
  root.innerHTML = `<button type="button" class="cs-trigger"><span class="cs-label ph"></span><span class="cs-caret">▾</span></button><div class="cs-menu" hidden></div>`;
  const trigger = root.querySelector(".cs-trigger"),
        label = root.querySelector(".cs-label"),
        menu = root.querySelector(".cs-menu");
  // ph lives on self so a language switch can update it via repaint()
  const self = { options: [], value: null, onChange, ph: root.dataset.ph || t("cs.placeholder") };

  function paint() {
    const cur = self.options.find(o => o.value === self.value);
    label.textContent = cur ? cur.label : self.ph;
    label.classList.toggle("ph", !cur);
    menu.innerHTML = self.options.length
      ? self.options.map(o => `<div class="cs-opt ${o.value === self.value ? "sel" : ""}" data-v="${encodeURIComponent(o.value)}">${o.label}<span class="ck">✓</span></div>`).join("")
      : `<div class="cs-empty">${t("cs.empty")}</div>`;
  }
  self.repaint = paint;
  function open() { if (!self.options.length) return; root.classList.add("open"); menu.hidden = false; }
  function close() { root.classList.remove("open"); menu.hidden = true; }

  trigger.addEventListener("click", e => { e.stopPropagation(); root.classList.contains("open") ? close() : open(); });
  menu.addEventListener("click", e => {
    const el = e.target.closest(".cs-opt"); if (!el || !el.dataset.v) return;
    self.set(decodeURIComponent(el.dataset.v)); close();
    if (self.onChange) self.onChange(self.value);
  });

  self.set = v => {
    const opt = self.options.find(o => String(o.value) === String(v));
    self.value = opt ? opt.value : self.value;
    paint();
  };
  self.setOptions = (opts, selected) => {
    self.options = opts;
    const want = opts.find(o => String(o.value) === String(selected))
              || opts.find(o => o.value === self.value) || opts[0];
    self.value = want ? want.value : null;
    paint();
  };
  self.close = close;
  self.setLoading = text => {
    self.options = []; self.value = null; close();
    label.innerHTML = `<span class="cs-spin"></span>${text || t("cs.loading")}`;
    label.classList.add("ph");
  };
  paint();
  Selects[id] = self;
  return self;
}
document.addEventListener("click", () => Object.values(Selects).forEach(s => s.close()));

async function loadRepos() {
  const r = await api("/api/repos").catch(() => null);
  if (!r) return; // server transiently down — stay quiet, poller will retry
  repos = r;
  $("repos").innerHTML = repos.map(r => `
    <div class="card repo">
      <button class="repo-del" title="${t("repo.delTitle")}" onclick="delRepo(${r.id})">✕</button>
      <div class="t">${r.name} <span class="pill ${r.status}">${r.status}</span></div>
      <div class="muted url">${r.git_url}</div>
      ${r.error ? `<div class="muted err">${r.error}</div>` : ""}
      ${r.status === "ready" ? `<button class="primary disp" onclick="openTaskModal(${r.id})">${t("task.dispatch")}</button>` : ""}
    </div>`).join("") || `<div class="repo-empty">
      <div class="ic">📦</div>
      <div class="t">${t("repo.emptyTitle")}</div>
      <div class="h">${t("repo.emptyHintPre")}<br><span class="link" onclick="openRepoModal()">${t("repo.new")}</span> ${t("repo.emptyHintPost")}</div>
    </div>`;
}
async function delRepo(id){ if(!await confirmDialog(t("repo.delConfirm"),{title:t("repo.delTitle"),okText:t("common.delete"),danger:true}))return; await api(`/api/repos/${id}`,{method:"DELETE"}); loadRepos(); }

// ---- remote machines (L1: terminal-only) ----
async function loadHosts() {
  const hs = await api("/api/hosts").catch(() => null);
  if (!hs) return;
  hostsById = Object.fromEntries(hs.map(h => [h.id, h]));
  $("hosts").innerHTML = hs.map(h => `
    <div class="card repo clickable${h.id === selectedHostId ? " selected" : ""}" data-id="${h.id}" onclick="connectHost(${h.id})">
      <button class="repo-del" title="${t("host.del")}" onclick="event.stopPropagation();delHost(${h.id})">✕</button>
      <div class="t">${h.name} <span class="pill ${h.kind === "mosh" ? "live" : "ready"}">${h.kind}</span></div>
      <div class="muted url">${h.target} · ${h.session}</div>
    </div>`).join("") || `<div class="repo-empty">
      <div class="ic">🖥</div>
      <div class="t">${t("host.emptyTitle")}</div>
      <div class="h">${t("host.emptyHintPre")}<br><span class="link" onclick="openHostModal()">${t("host.new")}</span> ${t("host.emptyHintPost")}</div>
    </div>`;
}
function openHostModal() { $("host-modal").style.display = "flex"; setTimeout(() => $("h-name").focus(), 30); }
function closeHostModal() { $("host-modal").style.display = "none"; }
async function addHost() {
  const body = {
    name: $("h-name").value.trim(), target: $("h-target").value.trim(),
    kind: Selects["h-kind"].value, session: $("h-session").value.trim() || "main",
  };
  if (!body.name || !body.target) return toast(t("host.required"), "error");
  await api("/api/hosts", { method: "POST", headers: {"content-type":"application/json"}, body: JSON.stringify(body) });
  $("h-name").value = ""; $("h-target").value = ""; $("h-session").value = "";
  closeHostModal();
  toast(t("host.added"), "success");
  loadHosts();
}
async function delHost(id){ if(!await confirmDialog(t("host.delConfirm"),{title:t("host.del"),okText:t("common.delete"),danger:true}))return; await api(`/api/hosts/${id}`,{method:"DELETE"}); loadHosts(); }

async function loadBranches() {
  const id = taskRepoId;
  if (!id) { Selects["t-base"].setOptions([]); return; }
  branchReq?.abort();                         // drop any in-flight request from a previous switch
  const ctl = branchReq = new AbortController();
  Selects["t-base"].setLoading(t("task.loadingBranches"));
  try {
    const branches = await api(`/api/repos/${id}/branches`, { signal: ctl.signal });
    const repo = repos.find(r=>r.id==id);
    Selects["t-base"].setOptions(branches.map(b => ({ value: b, label: b })), repo?.default_branch);
  } catch(e){
    if (e.name === "AbortError") return;       // superseded by a newer switch — leave the latest in charge
    Selects["t-base"].setOptions([{ value: "", label: e.message }]);
  }
}

async function addTask() {
  const body = {
    repo_id: Number(taskRepoId), base_branch: Selects["t-base"].value,
    title: $("t-title").value.trim(), prompt: $("t-prompt").value,
  };
  if (!body.repo_id || !body.base_branch || !body.title) return toast(t("toast.taskFieldsRequired"), "error");
  showLoading(t("loading.creatingWorktree"));
  try {
    const r = await api("/api/tasks", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify(body) });
    $("t-title").value = ""; $("t-prompt").value = "";
    closeTaskModal();
    showTab("live");
    toast(t("toast.taskDispatched", { session: r.session }), "success");
    await loadTasks();
    connect(r.id);
  } catch (e) {
    toast(t("toast.dispatchFailed", { error: e.message }), "error", 6000);
  } finally {
    hideLoading();
  }
}

function taskCard(t) {
  const active = t.status !== "cleaned";
  // one corner action per state — stop (active) / cleanup (cleaned)
  // NOTE: the param is `t` (the task), so it shadows the global t() — use I18N.t here.
  let icon, note = "";
  if (active) {
    icon = { glyph: "⏹", title: I18N.t("task.stopTitle"), fn: `archive(${t.id})` };
  } else if (t.hasWorktree) {
    icon = { glyph: "🗑", title: I18N.t("task.removeWorktree"), fn: `removeWt(${t.id})` };
    note = `<div class="muted">${I18N.t("task.worktreeKept")}</div>`;
  } else {
    icon = { glyph: "🗑", title: I18N.t("task.deleteRecord"), fn: `deleteTask(${t.id})` };
  }
  const head = `<div class="t">#${t.id} ${t.title}
    ${t.alive ? `<span class="pill live">live</span>` : `<span class="pill ${t.status}">${t.status}</span>`}</div>
    <div class="muted">${t.base_branch} → <code>${t.work_branch}</code></div>
    ${t.mr_url ? `<div><a href="${t.mr_url}" target="_blank" onclick="event.stopPropagation()">MR ↗</a></div>` : ""}`;
  const open = active ? ` clickable" onclick="connect(${t.id})` : "";
  const sel = t.id === selectedTaskId ? " selected" : "";
  return `<div class="card task${sel}${open}" data-id="${t.id}">
    <button class="card-x" title="${icon.title}" onclick="event.stopPropagation();${icon.fn}">${icon.glyph}</button>
    ${head}${note}
  </div>`;
}

async function loadTasks() {
  const tasks = await api("/api/tasks").catch(() => null);
  if (!tasks) return;
  tasksById = Object.fromEntries(tasks.map(t => [t.id, t]));
  const live = tasks.filter(t => t.status !== "cleaned");
  const archived = tasks.filter(t => t.status === "cleaned");
  $("tasks").innerHTML = live.map(taskCard).join("") ||
    emptyState("🗂️", t("empty.liveTitle"), t("empty.liveHint"));
  $("archived").innerHTML = archived.map(taskCard).join("") ||
    emptyState("📦", t("empty.archTitle"), t("empty.archHint"));
  $("arch-count").textContent = archived.length ? `(${archived.length})` : "";
}
function emptyState(icon, title, hint) {
  return `<div class="empty"><div class="empty-ic">${icon}</div><div>${title}</div>${hint ? `<div class="empty-hint">${hint}</div>` : ""}</div>`;
}
async function archive(id){
  if(!await confirmDialog(t("task.killConfirm"),{title:t("task.killTitle"),okText:t("task.kill"),danger:true}))return;
  await api(`/api/tasks/${id}/archive`,{method:"POST"});
  if (id === selectedTaskId) selectedTaskId = null;
  toast(t("toast.killed"),"success"); loadTasks();
}
async function removeWt(id){
  if(!await confirmDialog(t("task.removeWtConfirm"),{title:t("task.removeWorktree"),okText:t("common.delete"),danger:true}))return;
  await api(`/api/tasks/${id}/cleanup`,{method:"POST"});
  toast(t("toast.worktreeRemoved"),"success"); loadTasks();
}
function deleteTask(id){ if (id === selectedTaskId) selectedTaskId = null; api(`/api/tasks/${id}`,{method:"DELETE"}).then(loadTasks).catch(e=>toast(e.message,"error")); }
function showTab(tab){
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  $("tasks").hidden = tab !== "live";
  $("archived").hidden = tab !== "arch";
}
// ---- i18n wiring ----
function renderSwitcher() { $("lang-toggle").textContent = I18N.lang === "zh" ? "EN" : "中"; }
// re-render everything not covered by data-i18n attributes when the language flips
I18N.onChange = () => {
  renderSwitcher();
  renderDockToggle();
  const sel = Selects["t-base"];
  if (sel) { sel.ph = t("task.branchPh"); sel.repaint && sel.repaint(); }
  loadRepos();
  loadHosts();
  loadTasks();
};

I18N.init();         // resolve locale from localStorage / browser before first t()
I18N.applyStatic();  // fill all data-i18n / data-i18n-ph markup
renderSwitcher();

initTerm();
renderDockToggle();
$("t-base").dataset.ph = t("task.branchPh");   // localized placeholder for the branch select
csMount("t-base");
csMount("h-kind").setOptions([{ value: "ssh", label: "ssh" }, { value: "mosh", label: "mosh" }]);
loadRepos();
loadHosts();
loadTasks();
setInterval(loadTasks, 4000);
// close modals on backdrop click / Esc
$("repo-modal").addEventListener("click", e => { if (e.target.id === "repo-modal") closeRepoModal(); });
$("task-modal").addEventListener("click", e => { if (e.target.id === "task-modal") closeTaskModal(); });
$("host-modal").addEventListener("click", e => { if (e.target.id === "host-modal") closeHostModal(); });
document.addEventListener("keydown", e => {
  if (e.key !== "Escape") return;
  if (document.querySelector(".cs.open")) { Object.values(Selects).forEach(s => s.close()); return; }
  if ($("dialog").style.display === "flex") closeDialog(null);
  else { closeRepoModal(); closeTaskModal(); closeHostModal(); }
});
// poll repos so cloning -> ready (and clone errors) show up without manual refresh
setInterval(() => { if (repos.some(r => r.status === "cloning")) loadRepos(); }, 2000);
</script>
